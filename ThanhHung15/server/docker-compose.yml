services:
  mysql:
    image: mysql:8.0
    container_name: sudoku-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "sudoku"
      TZ: "Asia/Ho_Chi_Minh"
    ports:
      - "3306:3306"
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - sudoku_mysql_data:/var/lib/mysql

volumes:
  sudoku_mysql_data:

